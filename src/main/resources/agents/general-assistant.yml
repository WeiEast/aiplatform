# 通用助手智能体配置
agent:
  id: general-assistant
  name: 通用助手
  description: 一个友好的通用 AI 助手
  
spring:
  ai:
    dashscope:
      chat:
        options:
          model: qwen-max
          temperature: 0.7

# 系统提示词
system:
  prompt: |
    你是一个友好、专业的 AI 助手。
    请礼貌、清晰地回答用户的问题。
    如果不确定答案，请诚实地告知用户。

# 上下文配置
conversation:
  max-history-rounds: 5
