spring:
  application:
    name: ai-platform
  
  main:
    allow-bean-definition-overriding: true
  
  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_platform
    username: ${DB_USERNAME:dongfangwei}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境使用 validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # DashScope (通义千问) 配置
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      chat:
        options:
          model: qwen-max
  
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB


# 对话配置
conversation:
  max-history-rounds: 5  # 缓存 5 轮对话
  compression-model: qwen-turbo  # 使用轻量模型做摘要

# 上下文文件存储路径
context:
  storage:
    path: context

# 文档解析配置
document:
  parser:
    supported-types: PDF,DOCX,MD,TXT,XLSX
    temp-dir: ${java.io.tmpdir}/ai-platform/docs
    max-size: 50
  
  chunking:
    default-strategy: fixed_length
    chunk-size: 500
    overlap: 50
  
  embedding:
    model: text-embedding-v2
    dimension: 1536
    batch-size: 100
  
  storage:
    type: minio
    endpoint: http://localhost:9000
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ai-platform-docs

# 异步任务配置
async:
  executor:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100
    thread-name-prefix: doc-processor-

# 日志配置
logging:
  level:
    root: INFO
    com.ext: DEBUG
    org.springframework.ai: DEBUG
